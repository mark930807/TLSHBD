<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蔡任璿荷包蛋</title>
  <link rel="icon" href="LOGO.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="LOGO.png">

  <style>
    /* 所有頁面共用的樣式 */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI","Noto Sans TC", sans-serif;
        /*background:#000000;*/
        margin: 0;
        padding: 0;
    }

    html, body {
        height: 100%;
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        scroll-behavior: smooth;
    }

    .hero,.card1,.card2 {
        scroll-snap-align: start;
    }

    #bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;   /* 讓影片像 background-size: cover */
        z-index: -1;         /* 放到文字後面 */
    }

    .corner-box{
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        background: rgba(255,255,255,0.8);
        padding: 10px 15px;
        border-radius: 16px;
        backdrop-filter: blur(8px);
        z-index: 9999;
    }

    .corner-box.iz{
        display: none;
    }

    .container {
        margin: 0 auto;
        text-align: center;
        flex:1;
        box-sizing:border-box;
    }

    .hero {
        height: 100vh;
        height: 100svh;
        width: 100%;
        position: relative;  /* 讓 video 能定位 */
        overflow: hidden;
        flex-direction: column;
  
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .hero.start{
        display: none;
    }

    .hero.start.end{
        display: flex;
    }

    .card1{
        height: 100vh;
        height: 100svh;
        width: 100%;
        background: #fcf7df;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card2{
        height: 100vh;
        height: 100svh;
        width: 100%;
        background: #fcf7df;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card2.active{
        height: 100vh;
        height: 100svh;
        width: 100%;
        background: #fcf7df;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .slider {
        display: flex;
        gap: 20px;              /* 卡片間距 */
        overflow-x: auto;       /* 開啟左右滑動 */
        padding: 20px 40px;
        scroll-snap-type: x mandatory; 
        -webkit-overflow-scrolling: touch;
    }

    .slide-card {
        min-width: 230px;       /* 卡片寬度（重點！） */
        max-width: 270px;
        height: 230px;
    
        background: #c7d3db;
        border-radius: 20px;
        padding: 16px;
        box-sizing: border-box;
    
        flex-shrink: 0;         /* 防止被壓縮（超重要） */
        scroll-snap-align: center;
    
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .slide-card2 {
        min-width: 130px;       /* 卡片寬度（重點！） */
        max-width: 170px;
        height: 110px;
    
        background: #c7d3db;
        border-radius: 20px;
        padding: 16px;
        box-sizing: border-box;
    
        flex-shrink: 0;         /* 防止被壓縮（超重要） */
        scroll-snap-align: center;
    }

    .slider-wrapper {
        width: 100%;               /* 只占頁面 90% */
        max-width: 3000px;        /* 最大寬度 */
        margin: 0 auto;           /* 置中 */
        overflow-x: hidden;       /* 只讓 slider 滑，超出的部分隱藏 */
    }



    .title {
        color: white;
        font-size: 40px;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .titlesmallfone{
        color: #a79a8a;
        font-size: 20px;
    }

    .onapagedown{
        color:white
    }

    .bfont{
        width: 80%;
        font-size:22px;
    }

    h1{
        color:#3e3630;
        border-radius: 8px;
    }

    .hero h2{
        font-size: 20px;
        color:white;
    }

    .smaillfont{
        color:#aaa;
        font-size:20px;
    }

    .slider h1{
        font-size: 30px;
    }

    .slider p{
        color:#3e3630;
        font-size: 20px;
    }

    .slider img {
        /*width: 100%;*/
        height: 230px;
        object-fit: cover;
        border-radius: 12px;
        margin: 10px 0;
        flex-shrink: 0;         /* 防止被壓縮（超重要） */
        scroll-snap-align: center;
    }

    .slide-card img {
        /*width: 100%;*/
        height: 180px;
        object-fit: cover;
        flex-shrink: 0;         /* 防止被壓縮（超重要） */
        scroll-snap-align: center;
    }

    .card1 button,.card2 button{
        width: 300px;
        background: #c7d3db;
        color: #3e3630;
        margin-bottom: 8px;
        border-radius: 12px;
    }

    .corner-box button{
        width: 50px;
        height: 30px;
        background: #c7d3db;
        color: #3e3630;
        border-radius: 12px;
    }

    input{
        width: 300px;
        height: 40px;
        font-size: 20px;
        background: #3e3630;
        color: #fcf7df;
        text-align: center;
        margin-bottom: 8px;
        border-radius: 8px;
    }

    .redfont{
        color:rgb(209, 68, 68);
    }

    .buommt{
        width: 100%;
    }

    @media (max-width: 480px) {
        .slider {
            padding: 20px calc(50vw - 140px); 
        }

        .giftimg{
            width: 50%;
        }
    }

/* 平板以上 / 電腦 */
    @media (min-width: 481px) {
        .giftimg{
            width: 20%;
        }
    }

  </style>
</head>

<body>
    <div class="container">
        <div class="card1">
            <h1>依照下方資訊猜出密碼</h1>
            <div class="slider-wrapper">
                <div class="slider">
                    <img src="0214一.jpg">
                    <img src="0214二.jpg">
                </div>
            </div>
            <p class="bfont">輸入答案後按下驗證按鈕</p>
            <input type="text" id="ans1" placeholder="輸入密碼">
            <button onclick="checkans('1')"><h2>驗證</h2></button>
            <p class="smaillfont redfont"><span id="text1"></span></p>
        </div>
        <div id="step21" class="card2">
            <h1>第二關-數織遊戲</h1>
            <p class="bfont">在表格橫豎前方都有數字，數字代表連續的格子，兩個間必須包含一個以上的空格，例如:</p>
            <p class="bfont">1 2 =>□■□■■</p>
            <p class="bfont">3 =>□■■■□</p>
            <p class="bfont">把格子畫在紙上開始玩吧!</p>
            <p class="titlesmallfone">⇊ 往下滑開始玩! ⇊</p>
        </div>
        <div id="step22" class="card2">
            <h1>數織遊戲</h1>
            <p class="bfont">完成下面題目猜出密碼</p>
            <div class="slider-wrapper">
                <div class="slider">
                    <div class="slide-card">
                        <img src="數織1.png">
                    </div>
                    <div class="slide-card">
                        <img src="數織2.png">
                    </div>
                    <div class="slide-card">
                        <img src="數織3.png">
                    </div>
                </div>
            </div>
            <p class="bfont">輸入答案後按下驗證按鈕</p>
            <input type="text" id="ans2" placeholder="輸入密碼">
            <button onclick="checkans('2')"><h2>驗證</h2></button>
            <p class="smaillfont redfont"><span id="text2"></span></p>
        </div>
        <div id="step31" class="card2">
            <h1>終極密碼</h1>
            <p class="bfont">請從最大值到最小值選擇一個數字</p>
            <div class="slider">
                <div class="slide-card2">
                    <h1><span id="smallt"></span></h1>
                </div>
                <div class="slide-card2">
                    <h1><span id="bigt"></span></h1>
                </div>
            </div>
            <p class="bfont">輸入數字後按下驗證按鈕</p>
            <input type="text" id="ans3" placeholder="輸入數字">
            <button onclick="checkans('3')"><h2>驗證</h2></button>
        </div>
        <div id="win" class="card2">
            <h1>恭喜你猜對密碼</h1>
            <p class="bfont">禮物就在行李箱裡，密碼是</p>
            <h1>062</h1>
        </div>
    </div>
    
    
    <script>
        let starttime=Date.now();
        let step=0;
        setInterval(()=>{
            let nowtime=Date.now()
            if((nowtime-starttime)>10000){
                if(step == 0){
                    alert("因為你第一關破解了三分鐘，所以我們開啟第二關，你可以在第二關破解密碼")
                    showPage('step21');
                    showPage('step22');
                    window.location.href="#step21"
                    starttime=Date.now();
                    step++;
                }
                else if(step == 1){
                    alert("因為你第二關又破解了三分鐘，所以我們開啟第三關，你可以在第三關破解密碼")
                    showPage('step31');
                    showPage('step22');
                    window.location.href="#step31"
                    starttime=Date.now();
                    step++;
                }
            }
        },10)
        let big=999;
        let small=0;
        setInterval(()=>{
            document.querySelector("#bigt").textContent = big;
            document.querySelector("#smallt").textContent = small;
        },10)
        function checkans(which) {
            if(which == '1'){
                if(document.getElementById("ans1").value == 62){
                    showPage('win');
                    window.location.href="#win";
                    step=2;
                }
                else{
                    document.querySelector("#text1").textContent = "答錯了.....";
                }   
            }
            if(which == '2'){
                if(document.getElementById("ans2").value == "062"){
                    showPage('win');
                    window.location.href="#win";
                    step=2;
                }
                else{
                    document.querySelector("#text2").textContent = "答錯了.....";
                }   
            }
            if(which == '3'){
                if(document.getElementById("ans3").value == 62){
                    showPage('win');
                    window.location.href="#win";
                    step=2;
                }
                else{
                    if(document.getElementById("ans3").value>62){
                        big=document.getElementById("ans3").value
                    }
                    else if(document.getElementById("ans3").value<62){
                        small=document.getElementById("ans3").value
                    }
                    document.getElementById("ans3").value="";
                }   
            }
        }
        function showPage(pageId) {
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
